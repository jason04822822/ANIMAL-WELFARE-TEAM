<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 檢視器</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
        // 偵測用家係咪用緊手機或平版
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 如果係手機，直接將成個網頁跳轉去 PDF 檔案本身
        if (isMobile()) {
            window.location.href = "貓狗感想.pdf";
        }
    </script>
</head>
<body>

    <iframe src="貓狗感想.pdf">
        您的瀏覽器不支援內嵌 PDF，請 <a href="貓狗感想.pdf">點擊此處下載</a>。
    </iframe>

</body>
</html>
